<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magnetics 2D Lab</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <section class="panel">
        <h1>Magnetics 2D Lab</h1>
        <div class="row">
          <button id="startPauseBtn">Start</button>
          <button id="stepBtn">Step</button>
          <button id="resetBtn">Reset View</button>
        </div>

        <h2>Add Shape</h2>
        <div class="grid">
          <label>Type <select id="shapeType"><option value="rectangle">Rectangle</option><option value="circle">Circle</option></select></label>
          <label>X <input id="shapeX" type="number" value="180" /></label>
          <label>Y <input id="shapeY" type="number" value="180" /></label>
          <label>Width <input id="shapeW" type="number" value="90" /></label>
          <label>Height <input id="shapeH" type="number" value="50" /></label>
          <label>Radius <input id="shapeR" type="number" value="28" /></label>
          <label>Mass <input id="shapeMass" type="number" value="1" min="0.1" step="0.1" /></label>
          <label>Angle (deg) <input id="shapeAngle" type="number" value="0" /></label>
          <label>Magnetic <input id="shapeMagnetic" type="checkbox" /></label>
          <label>Mag Moment <input id="shapeMoment" type="number" value="40" /></label>
        </div>
        <button id="addShapeBtn">Add Shape</button>

        <h2>Add Constraint</h2>
        <div class="grid">
          <label>Body A <input id="constraintA" type="number" value="1" min="1" /></label>
          <label>Body B <input id="constraintB" type="number" value="2" min="1" /></label>
          <label>Distance <input id="constraintDist" type="number" value="120" min="1" /></label>
          <label>Stiffness <input id="constraintK" type="number" value="8" step="0.1" min="0.1" /></label>
        </div>
        <button id="addConstraintBtn">Add Constraint</button>

        <h2>Tracking</h2>
        <div class="grid">
          <label>Body ID <input id="trackBody" type="number" value="1" min="1" /></label>
          <label>Metric
            <select id="trackMetric">
              <option value="force">Force Magnitude</option>
              <option value="torque">Torque</option>
              <option value="x">Position X</option>
              <option value="y">Position Y</option>
              <option value="angle">Angle</option>
            </select>
          </label>
        </div>
        <div class="row">
          <button id="startTrackingBtn">Start Tracking</button>
          <button id="clearTrackingBtn">Clear Plot</button>
        </div>

        <h2>Project Import / Export</h2>
        <div class="row">
          <button id="exportBtn">Export JSON</button>
          <button id="importBtn">Import JSON</button>
        </div>
        <textarea id="projectJson" rows="7" placeholder="Project JSON..."></textarea>
      </section>

      <section class="workspace">
        <canvas id="simCanvas" width="980" height="620"></canvas>
        <canvas id="plotCanvas" width="980" height="230"></canvas>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
